base:
  project_name: DPDF_LQ
  ckpt_root: ./ckpt
  seed: 1
  lr: 0.00006
  weight_decay: 0.0003
  batch_size: 64
  n_epochs: 200
  num_workers: 0
  gpu_id: 0
  # Disable early stopping so MOSI can train for the configured epochs.
  # Keep Mult_acc_7 as the validation checkpoint metric because the current
  # bottleneck is fine-grained regression/category calibration.
  early_stop_patience: 0
  early_stop_metric: Mult_acc_7
  early_stop_mode: max
  early_stop_min_delta: 0.0001

dataset:
  datasetName: mosi
  dataPath: ./dataset/MOSI/unaligned_50.pkl
  train_mode: regression

model:  
  bert_pretrained: ./best_cpk/bert

  # Projection Layer Parameters
  l_proj_dim: 768
  a_proj_dim: 5
  v_proj_dim: 20
  proj_dst_dim: 128

  # Transformer Parameters
  token_len: 8
  token_dim: 128
  l_proj_length: 500
  a_proj_length: 500
  v_proj_length: 500
  proj_input_dim: 128
  proj_depth: 1
  proj_heads: 8
  proj_mlp_dim: 128

  # Text Encoder Parameters
  token_length: 8
  l_enc_heads: 8
  l_enc_mlp_dim: 128

  #DGLQA Layer Parameters
  DGLQA_depth: 3
  DGLQA_heads: 8
  DGLQA_dim_head: 16
  DGLQA_droup: 0.

  # Fusion Layer Parameters
  fusion_heads: 8
  fusion_mlp_dim: 128
  fusion_layer_depth: 2

  # MOSI-specific settings for the event-slot / signed-graph model.
  # MOSI is much smaller than MOSEI. Too many event slots or repeated
  # graph-event refinement can over-smooth sentiment intensity and hurt
  # Mult_acc_7 / MAE / Corr, so this setting uses a lighter graph path.
  event_slot_num: 2
  iteration_num: 1
  contrastive_weight: 0.003
  graph_regularization_weight: 0.0001
  event_regularization_weight: 0.00005
  counterfactual_weight: 0.0
  bipolar_weight: 0.0
  mae_task_weight: 0.0
  smooth_l1_task_weight: 0.0
  has0_classification_weight: 0.0