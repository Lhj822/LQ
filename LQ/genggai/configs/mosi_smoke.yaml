base:
  project_name: DPDF_LQ_smoke
  ckpt_root: ./ckpt
  seed: 1
  lr: 0.0001
  weight_decay: 0.0001
  batch_size: 2
  n_epochs: 1
  num_workers: 0
  gpu_id: 0

dataset:
  datasetName: mosi
  dataPath: ./tmp_smoke/mosi_smoke_8.pkl
  train_mode: regression

model:
  bert_pretrained: ./best_cpk/bert

  l_proj_dim: 768
  a_proj_dim: 5
  v_proj_dim: 20
  proj_dst_dim: 128

  token_len: 8
  token_dim: 128
  l_proj_length: 500
  a_proj_length: 500
  v_proj_length: 500
  proj_input_dim: 128
  proj_depth: 1
  proj_heads: 8
  proj_mlp_dim: 128

  token_length: 8
  l_enc_heads: 8
  l_enc_mlp_dim: 128

  DGLQA_depth: 3
  DGLQA_heads: 8
  DGLQA_dim_head: 16
  DGLQA_droup: 0.

  fusion_heads: 8
  fusion_mlp_dim: 128
  fusion_layer_depth: 2
